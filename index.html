<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>カレンダー</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="カレンダー" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="topbar__title">
        <span id="fyLabel" class="fy">—</span>
        <span class="topbar__sub">年度カレンダー</span>
      </div>
      <button id="syncBtn" class="iconbtn" type="button" title="同期状態" aria-label="同期状態">
        <span id="syncDot" class="dot dot--idle"></span>
      </button>
    </header>

    <section class="calendar card">
      <div class="calendar__nav">
        <button id="prevBtn" class="navbtn" type="button" aria-label="先月">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 id="monthLabel" class="calendar__month">—</h1>
        <button id="nextBtn" class="navbtn" type="button" aria-label="来月">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="weekhead" aria-hidden="true">
        <span class="weekhead__cell weekhead__cell--sun">日</span>
        <span class="weekhead__cell">月</span>
        <span class="weekhead__cell">火</span>
        <span class="weekhead__cell">水</span>
        <span class="weekhead__cell">木</span>
        <span class="weekhead__cell">金</span>
        <span class="weekhead__cell weekhead__cell--sat">土</span>
      </div>

      <div id="grid" class="grid" role="grid" aria-label="日付"></div>

      <p class="hint">タップで<span class="hint__mark">〇</span>を付ける・長押しで削除</p>
    </section>

    <section class="summary">
      <h2 class="summary__title">曜日ごとの合計<small id="summaryRange"></small></h2>
      <div id="dowCards" class="dowcards"></div>
    </section>

    <footer class="footer">
      <button id="lockBtn" class="linkbtn" type="button">この端末のトークンを削除</button>
    </footer>
  </div>

  <div id="banner" class="banner" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
